name: PowerGuard CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend-smoke:
    name: Backend Startup Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start backend server
        working-directory: backend
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
          echo $! > uvicorn.pid

      - name: Verify /healthz responds
        working-directory: backend
        run: |
          for i in {1..20}; do
            if curl -sf http://127.0.0.1:8000/healthz > /dev/null; then
              echo "Backend health check passed."
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to become healthy in time."
          cat uvicorn.log
          exit 1

      - name: Stop backend server
        if: always()
        working-directory: backend
        run: |
          if [ -f uvicorn.pid ]; then
            kill "$(cat uvicorn.pid)" || true
          fi

  frontend-quality:
    name: Frontend Lint TypeCheck Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Type-check frontend
        working-directory: frontend
        run: npm run type-check

      - name: Build frontend
        working-directory: frontend
        run: npm run build